# herdr-scratch-pane
#
# Native floating scratch popups for Herdr. Herdr composites the popup over the
# active pane while tmux preserves the shell and current terminal viewport.

id = "herdr-scratch-pane"
name = "herdr-scratch-pane"
version = "0.1.2"
description = "Persistent native floating scratch popups for Herdr."
min_herdr_version = "0.7.4"
platforms = ["macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[panes]]
id = "workspace-scratch"
title = "⌂ scratch workspace"
placement = "popup"
width = "85%"
height = "80%"
command = ["./target/release/herdr-scratch-pane", "run-pane", "--scope", "workspace"]

[[panes]]
id = "session-scratch"
title = "⌂ scratch session"
placement = "popup"
width = "85%"
height = "80%"
command = ["./target/release/herdr-scratch-pane", "run-pane", "--scope", "session"]

[[actions]]
id = "toggle-workspace"
title = "Toggle workspace scratch pane"
description = "Open or reattach the floating scratch popup for the current workspace."
command = ["./target/release/herdr-scratch-pane", "toggle", "--scope", "workspace"]

[[actions]]
id = "toggle-session"
title = "Toggle session scratch pane"
description = "Open or reattach the session-global floating scratch popup."
command = ["./target/release/herdr-scratch-pane", "toggle", "--scope", "session"]

[[actions]]
id = "minimize-current"
title = "Minimize current scratch pane"
description = "Compatibility action for minimizing a legacy split scratch pane."
command = ["./target/release/herdr-scratch-pane", "minimize"]

[[actions]]
id = "install-keybindings"
title = "Install scratch pane keybindings"
description = "Update Herdr config with the recommended scratch pane keybindings."
command = ["./target/release/herdr-scratch-pane", "install-keybindings"]
